version: 2
updates:
  # Keep the GitHub Actions used in CI / publish workflows current
  # (this is what the Node 20 deprecation warning was about).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - github-actions

  # Python dependency bumps (pyproject extras). Grouped so a routine
  # week is one PR, not a dozen.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
      - python
    groups:
      python-deps:
        patterns:
          - "*"
